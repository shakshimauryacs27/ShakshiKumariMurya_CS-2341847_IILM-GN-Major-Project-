name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      
      - name: Build frontend image
        run: docker build -t shakshi05/frontend:v1 ./frontend

      - name: Push frontend image
        run: docker push shakshi05/frontend:v1

      
      - name: Build backend image
        run: docker build -t shakshi05/backend:v1 ./backend

      - name: Push backend image
        run: docker push shakshi05/backend:v1

     
      - name: Build admin image
        run: docker build -t shakshi05/admin:v1 ./admin

      - name: Push admin image
        run: docker push shakshi05/admin:v1